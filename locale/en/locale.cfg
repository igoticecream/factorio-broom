[mod-setting-name]
broom-atomic-bomb=Prevent atomic bomb scorchmarks

[mod-setting-description]
broom-atomic-bomb=Prevents atomic bombs from creating scorchmarks and scorched terrain

[controls]
broom-get-selection-tool=Get broom tool

[shortcut-name]
broom-get-selection-tool=Broom

[item-name]
broom-selection-tool=Broom tool

[item-description]
broom-selection-tool=Sweep away unwanted elements from the surface

[gui]
broom-remove=Remove
broom-trees=Trees
broom-trees-tooltip=Expand to choose whether to remove or heal trees in the selected area
broom-remove-trees-tooltip=Removes trees from the selected area
broom-tree-heal=Heal
broom-tree-heal-tooltip=Restores pollution-damaged trees in the selected area to full health, regrowing their leaves
broom-tree-heal-unpolluted=Heal if pollution-free
broom-tree-heal-unpolluted-tooltip=Restores damaged trees only where no pollution remains, so they will not be damaged again
broom-rocks=Rocks
broom-rocks-tooltip=Expand to choose whether to remove or heal rocks in the selected area
broom-remove-rocks-tooltip=Removes rocks from the selected area
broom-rock-heal=Heal
broom-rock-heal-tooltip=Restores damaged rocks in the selected area to full health, removing their health bar
broom-cliffs=Cliffs
broom-cliffs-tooltip=Removes cliffs from the selected area
broom-resources=Resources
broom-resources-tooltip=Expand to choose which resources to exclude from removal
broom-resources-solids=Ores
broom-resources-fluids=Liquids
broom-exclude-resource=Exclude __1__
broom-exclude-resource-tooltip=Excludes __1__ from being removed when cleaning up resources
broom-nuclear=Atomic bomb aftermath
broom-nuclear-tooltip=Removes atomic bomb scorchmarks, smoke, nuclear decoratives, and restores affected terrain in the selected area
broom-biter-creep=Biter creep
broom-biter-creep-tooltip=Removes biter nest decoratives (creep) from the selected area
broom-decoratives=Decoratives
broom-decoratives-tooltip=Expand to choose whether to remove or regenerate decoratives in the selected area
broom-remove-decoratives-tooltip=Removes decorative objects (grass, shrubs, etc.) from the selected area
broom-remove-artificial=Remove from tiles
broom-remove-artificial-tooltip=Removes decoratives only from artificial tiles (like concrete or stone bricks), leaving natural terrain intact
broom-regenerate=Regenerate
broom-regenerate-tooltip=Regenerates decorative objects (grass, shrubs, etc.) in the selected area
broom-corpses=Corpses
broom-corpses-tooltip=Expand to choose which corpse types to exclude from removal
broom-exclude-biter=Exclude biter corpses
broom-exclude-biter-tooltip=Excludes biter corpses from being removed when cleaning up corpses
broom-exclude-scorchmark=Exclude scorchmarks
broom-exclude-scorchmark-tooltip=Excludes scorchmarks from being removed when cleaning up corpses
broom-exclude-stump=Exclude tree stumps
broom-exclude-stump-tooltip=Excludes tree stumps from being removed when cleaning up corpses
broom-exclude-remnants=Exclude remnants
broom-exclude-remnants-tooltip=Excludes remnants of destroyed entities (like vehicle wrecks or building ruins) from being removed when cleaning up corpses
broom-subheader=Select conditions
broom-reset-tooltip=Reset all conditions to defaults
